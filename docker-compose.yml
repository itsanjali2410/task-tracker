version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_BACKEND_URL=http://backend:8001
    container_name: task-tracker-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - app-network
    environment:
      - REACT_APP_BACKEND_URL=http://backend:8001

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: task-tracker-backend
    ports:
      - "8001:8001"
    environment:
      - MONGO_URL=mongodb+srv://tripstars:trip1234@cluster0.fqy0kzg.mongodb.net/
      - DB_NAME=task_tracker
      - JWT_SECRET_KEY=tripstars-secret-key-change-in-production
      - CORS_ORIGINS=http://localhost:3000,http://localhost:5173,http://frontend:3000,https://chatapp.tripstarsholidays.com,https://task-tracker-git-main-anjalis-projects-eb3c2b0a.vercel.app
      - DEBUG=False
    volumes:
      - ./backend:/app
      - ./backend/uploads:/app/uploads
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload
    networks:
      - app-network

  # Optional: MongoDB (if you want to use local MongoDB instead of Atlas)
  # mongodb:
  #   image: mongo:7.0
  #   container_name: task-tracker-mongodb
  #   ports:
  #     - "27017:27017"
  #   environment:
  #     MONGO_INITDB_ROOT_USERNAME: admin
  #     MONGO_INITDB_ROOT_PASSWORD: password
  #   volumes:
  #     - mongodb_data:/data/db
  #   networks:
  #     - app-network

networks:
  app-network:
    driver: bridge

